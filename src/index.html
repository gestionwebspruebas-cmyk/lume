<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, 
maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>LUMES</title>
  <link rel="icon" type="image/x-icon" href="chama1.png">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    /* ---------- CSS Reset & Base ---------- */
    *,
    *::before,
    *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      background: #0f172a;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ---------- Layout ---------- */
    .app {
      position: relative;
      width: 100%;
      height: 100dvh;
      height: 100vh; /* fallback */
    }

    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    /* ---------- Top Header ---------- */
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(15,23,42,0.85), 
rgba(15,23,42,0));
      pointer-events: none;
    }
    .topbar > * { pointer-events: auto; }
    .brand {
      display: flex; align-items: center; gap: 8px;
      color: #01060c;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .brand .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 0 4px rgba(34,197,94,0.25);
    }
    .count-badge {
      background: rgba(255,255,255,0.12);
      color: #f8fafc;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
    }
    .count-badge b { color: #22c55e; }

    /* ---------- Floating Control Buttons (top-right) ---------- */
    .controls {
      position: absolute;
      top: 70px; right: 14px;
      z-index: 1000;
      display: flex; flex-direction: column; gap: 10px;
    }
    .btn {
      width: 44px; height: 44px;
      display: grid; place-items: center;
       background: linear-gradient(120deg, rgba(15,23,42,0.85), 
rgba(15,23,42,0));
      border: 1px solid black;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
      color: #0f172a;
    }
    .btn:hover { transform: translateY(-1px); border: 2px inset white;}
    .btn:active { transform: translateY(0) scale(0.97); }
    .btn.primary { background: #2563eb; color: #fff; }
    .btn.primary:hover { background: #1d4ed8; }
    .btn svg { width: 22px; height: 22px; }

    /* ---------- Bottom Action Bar (mobile-first) ---------- */
    .actionbar {
      position: absolute;
      
      left: 14px; right: 14px; bottom: 18px;
      z-index: 1000;
      display: flex; 
      
      left: 50%;
      transform: translate(-50%,0);
      gap: 10px;
      
    }
    .action {
      flex: 1;
      display: flex;  
      justify-content: center; 
      text-align: center;
      gap: 8px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid black;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
      transition: transform 0.12s ease, filter 0.12s ease;
    }
    .action:active { transform: scale(0.98); }
    .action.add { background: #22c55e; color: #052e16; }
    .action.add:hover { filter: brightness(1.05); }
    .action.clear { background: #fee2e2; color: #7f1d1d; flex: 0 0 auto; padding: 14px 18px; }
    .action.clear:hover { background: #fecaca; }
    .action svg { width: 20px; height: 20px; }
    .action.add.active { background: #f59e0b; color: #1f2937; }

    /* ---------- Popup Styling ---------- */
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      background: linear-gradient(120deg, rgba(247, 247, 248, 0.85), rgba(15,23,42,0));
      border: 1px solid black;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
      color: #d4d5daee;
    }

    .leaflet-popup-content { margin: 12px 14px;  }
    .popup-title { font-weight: 700; margin: 0 0 4px; font-size: 14px; color: #0f172a; }
    .popup-coords { font-size: 12px; color: #475569; margin: 0 0 8px; font-family: ui-monospace, monospace; }
    .popup-actions { display: flex; gap: 6px; margin-top: 8px; }
    .popup-btn {
      flex: 1; padding: 6px 8px; font-size: 12px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
    }
    .popup-btn.del { background: #fee2e2; color: #7f1d1d; }
    .popup-btn.del:hover { background: #fecaca; }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #0f172a;
      color: #f8fafc;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 2000;
      max-width: 90%;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ---------- Desktop tweaks ---------- */
    @media (min-width: 768px) {
      .topbar { padding: 16px 22px; }
      /*.controls { top: 80px; right: 22px; }*/
      .actionbar { left: auto; right: 22px; bottom: 22px; width: 420px; }
      .brand { font-size: 16px; }
    }

    /* Hide Leaflet attribution flag clutter on small screens */
    .leaflet-control-attribution { font-size: 10px; }
  </style>
</head>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
  var current = '';
    //-----------------Datos metereolóxicos  -------------
async function getCurrentWeather(lat, lon){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,wind_speed_10m,wind_direction_10m,wind_gusts_10m&timezone=auto`;
  console.log(url);
  try {
    const response = await fetch(url);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();

    if (!data?.current) {
      console.error("Respuesta inválida:", data);
      return null;
    }

    current = {
      temperature: data.current.temperature_2m,
      humidity: data.current.relative_humidity_2m,
      feelsLike: data.current.apparent_temperature,
      precipitation: data.current.precipitation ?? 0,
      windSpeed: data.current.wind_speed_10m ?? 0,
      windDirection: data.current.wind_direction_10m ?? 0,
      windGusts: data.current.wind_gusts_10m ?? 0,
      elevation: data.elevation ?? null,
      time: data.current.time
    };

    console.log("✅ Clima actual:", current);
    return current;

  } catch (error) {
    console.error("❌ Error al obtener datos meteorológicos:", error);
    return null;
  }
}
    // ---------- State ----------
    const state = {
      addMode: false,
      markers: [],          // { id, latlng, marker, name }
      userMarker: null,
      userAccuracy: null,
      nextId: 1,
    };

    // ---------- Map Setup ----------
    const map = L.map('map', {
      zoomControl: false,           // we use custom buttons
      attributionControl: true,
    }).setView([42.908, -7.702],8);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // Ensure the map recalculates its size when the layout changes (mobile rotation, etc.)
    setTimeout(() => map.invalidateSize(), 200);
    window.addEventListener('resize', () => map.invalidateSize());

    // ---------- Custom marker icon ----------
    const customIcon = L.icon({
      iconUrl:
        'data:image/svg+xml;utf8,' +
        encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 44" width="32" height="44">
            <defs>
              <filter id="s" x="-20%" y="-10%" width="140%" height="140%">
                <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
              </filter>
            </defs>
            <path filter="url(#s)" d="M16 1C8.3 1 2 7.3 2 15c0 9.5 12.5 26.5 13 27 .4.4 1.6.4 2 0 .5-.5 13-17.5 13-27C30 7.3 23.7 1 16 1z" fill="#2563eb"/>
            <circle cx="16" cy="15" r="6" fill="#ffffff"/>
          </svg>
        `),
      iconSize: [32, 44],
      iconAnchor: [16, 42],
      popupAnchor: [0, -38],
    });

    // ---------- User location marker icon ----------
    const userIcon = L.icon({
      iconUrl:
        'data:image/svg+xml;utf8,' +
        encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
            <circle cx="12" cy="12" r="6" fill="#22c55e" stroke="#ffffff" stroke-width="3"/>
          </svg>
        `),
      iconSize: [24, 24],
      iconAnchor: [12, 12],
    });

    // ---------- DOM refs ----------
    const $ = (id) => document.getElementById(id);
    const addModeBtn = $('addModeBtn');
    const marcadorBtn = $('marcadorBtn');
    const elimiBtn = $('elimiBtn');
    const addModeLabel = $('addModeLabel');
    const clearBtn = $('clearBtn');
    const locateBtn = $('locateBtn');
    const zoomInBtn = $('zoomInBtn');
    const zoomOutBtn = $('zoomOutBtn');
    const markerCountEl = $('markerCount');
    const toastEl = $('toast');

    // ---------- Toast ----------
    let toastTimer;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
    }

    // ---------- Counter ----------
    function updateCount() {
      markerCountEl.textContent = state.markers.length;
    }

    // ---------- Format coords ----------
    function fmt(n) { return n.toFixed(5); }

    // ---------- Add a marker ----------
    function addMarker(latlng, name){
      const id = state.nextId++;
      const m = L.marker(latlng, { icon: customIcon, draggable: false }).addTo(map);
      getCurrentWeather(latlng.lat, latlng.lng);
      //alert('hola: '+current.temperature);
      const popupHtml = `
        <div>
          <p class="popup-title">${escapeHtml(name)}</p>
          <p class="popup-coords">Lon: ${fmt(latlng.lat)}, Lat: ${fmt(latlng.lng)}</p>
          <p class="popup-coords">Altura: ${current.elevation} m</p>
          <p class="popup-coords">Temperatura: ${current.temperature} ºC</p>
          <p class="popup-coords">Humidade: ${current.humidity} %</p>
          <p class="popup-coords">V. Vento: ${current.windSpeed} m/s</p>
          <p class="popup-coords">D. Vento: ${current.windDirection} ºC</p>
          <div class="popup-actions">
            <button class="popup-btn del" data-action="delete" data-id="${id}">Borrar</button>
          </div>
        </div>
      `;
      
      m.bindPopup(popupHtml);
      m.on('popupopen', (e) => {
        const btn = e.popup.getElement().querySelector('[data-action="delete"]');
        if (btn) btn.addEventListener('click', () => removeMarker(id));
      });
      m.on('dragend', (e) => {
        const newLatLng = e.target.getLatLng();ç
        alert('movome');
        const item = state.markers.find(x => x.id === id);
        if (item) item.latlng = newLatLng;
      });

      const item = { id, latlng, marker: m, name };
      state.markers.push(item);
      updateCount();
      return item;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[c]));
    }

    function removeMarker(id) {
      const idx = state.markers.findIndex(x => x.id === id);
      if (idx === -1) return;
      map.removeLayer(state.markers[idx].marker);
      state.markers.splice(idx, 1);
      updateCount();
    }

    function clearAllMarkers() {
      if (state.markers.length === 0) return;
      state.markers.forEach(m => map.removeLayer(m.marker));
      state.markers = [];
      updateCount();
      toast('Todos os marcadores eliminados !');
    }

    // ---------- Add mode toggle ----------
    function setAddMode(on) {
      state.addMode = on;
      addModeBtn.classList.toggle('active', on);
      addModeLabel.textContent = on ? 'Pulsa no mapa' : '+ Marcador';
      map.getContainer().style.cursor = on ? 'crosshair' : '';
    }

    addModeBtn.addEventListener('click', () => setAddMode(!state.addMode));
    marcadorBtn.addEventListener('click', () => setAddMode(!state.addMode));
    clearBtn.addEventListener('click', clearAllMarkers);
    elimiBtn.addEventListener('click', clearAllMarkers);
    // Click to add marker (only when add mode is on)
    map.on('click', (e) => {
      if (!state.addMode) return;
      const name = `Punto_${state.markers.length + 1}`;
      const item = addMarker(e.latlng, name);
      item.marker.openPopup();
      setAddMode(false);
      toast('Marcador engadido');
    });

    // ---------- Zoom buttons ----------
    zoomInBtn.addEventListener('click', () => map.zoomIn());
    zoomOutBtn.addEventListener('click', () => map.zoomOut());

    // ---------- Locate me ----------
    function locateUser() {
      if (!('geolocation' in navigator)) {
        toast('Xeolocalización non soportada');
        return;
      }
      toast('Locating…');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          const latlng = [latitude, longitude];

          if (state.userMarker) map.removeLayer(state.userMarker);
          if (state.userAccuracy) map.removeLayer(state.userAccuracy);

          state.userAccuracy = L.circle(latlng, {
            radius: accuracy,
            color: '#22c55e',
            fillColor: '#22c55e',
            fillOpacity: 0.15,
            weight: 1.5,
          }).addTo(map);

          state.userMarker = L.marker(latlng, { icon: userIcon })
            .addTo(map)
            .bindPopup(`<b>You are here</b><br><span class="popup-coords">${fmt(latitude)}, ${fmt(longitude)}</span><br>±${Math.round(accuracy)} m`)
            .openPopup();

          map.flyTo(latlng, 15, { duration: 1.2 });
          toast('Location found');
        },
        (err) => {
          const msg = err.code === 1 ? 'Permission denied' :
                      err.code === 2 ? 'Position unavailable' :
                      'Location request timed out';
          toast(msg);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    }
    locateBtn.addEventListener('click', locateUser);
    
    // ---------- Init ----------
    updateCount();

    // Try to locate on load (non-blocking, silent if denied)
    if ('geolocation' in navigator) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          map.flyTo([latitude, longitude], 13, { duration: 1.2 });
          state.userMarker = L.marker([latitude, longitude], { icon: userIcon })
            .addTo(map)
            .bindPopup('You are here');
            state.userAccuracy = L.circle([latitude, longitude], {
            radius: pos.coords.accuracy, color: '#22c55e',
            fillColor: '#22c55e', fillOpacity: 0.15, weight: 1.5
          }).addTo(map);
        },
        () => { /* user denied - no-op, map stays at default view */ },
        { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
      );
    }

    
  </script>
</body>
</html>
